<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Экран регистрации -->
    <div id="auth-screen" class="container">
        <div class="box">
            <h2>Регистрация в Hyper-Встречах</h2>
            <input type="text" id="username" placeholder="Ваше отображаемое имя..." autocomplete="off">
            
            <div class="social-toggles">
                <button type="button" class="btn-toggle" onclick="toggleInput('dc-block')">Указать Discord</button>
                <button type="button" class="btn-toggle" onclick="toggleInput('tg-block')">Указать Telegram</button>
            </div>

            <input type="text" id="dc-input" class="social-input dc-block" placeholder="Ваш Discord tag...">
            <input type="text" id="tg-input" class="social-input tg-block" placeholder="Ваш @Telegram...">

            <button id="start-btn" class="btn-primary">Найти собеседника</button>
        </div>
    </div>

    <!-- Основной интерфейс чата -->
    <div id="chat-screen" class="container hidden">
        <!-- Левая панель -->
        <div class="media-panel">
            <button id="voice-toggle" class="btn-action">Начать голосовой чат</button>
            
            <div id="media-controls" class="controls-grid hidden">
                <div class="control-group">
                    <button id="mic-btn" class="active">Микрофон: ВКЛ</button>
                    <select id="mic-select"><option>По умолчанию</option></select>
                </div>
                
                <div class="control-group">
                    <button id="audio-btn" class="active">Наушники: ВКЛ</button>
                    <select id="audio-select"><option>По умолчанию</option></select>
                </div>

                <button id="share-btn">Трансляция экрана: ВЫКЛ</button>
                <button id="cam-btn">Камера: ВЫКЛ</button>
            </div>

            <button id="skip-btn" class="btn-danger">Завершить сеанс (Skip)</button>
        </div>

        <!-- Правая панель -->
        <div class="chat-panel">
            <div id="chat-messages" class="messages-area"></div>
            
            <div class="input-area">
                <div class="autocomplete-wrapper">
                    <input type="text" id="msg-input" placeholder="Введите сообщение или / для команд..." autocomplete="off">
                    <div id="hints" class="hints-box hidden"></div>
                </div>
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const chatMessages = document.getElementById('chat-messages');
        const msgInput = document.getElementById('msg-input');
        const hints = document.getElementById('hints');

        const commandsList = [
            { cmd: '/send discord', desc: 'Отправить свой Discord из профиля' },
            { cmd: '/send telegram', desc: 'Отправить свой Telegram из профиля' },
            { cmd: '/skip', desc: 'Пропустить текущего собеседника' },
            { cmd: '/report', desc: 'Пожаловаться на нарушения в Discord' }
        ];

        function toggleInput(className) {
            const el = document.querySelector(`.${className}`);
            el.classList.toggle('visible');
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const discord = document.getElementById('dc-input').value.trim();
            const telegram = document.getElementById('tg-input').value.trim();

            if (!username) return alert('Введите имя!');

            socket.emit('register', { username, discord, telegram });
            
            authScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden'); 
            chatScreen.style.display = 'flex';
        });

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            socket.emit('chat_message', text);
            msgInput.value = '';
            hints.classList.add('hidden');
        }

        document.getElementById('skip-btn').addEventListener('click', () => {
            stopMedia();
            socket.emit('skip_user');
        });

        // Слушатели Socket.io
        socket.on('waiting', (text) => {
            chatMessages.innerHTML = `
                <div class="search-loader-container">
                    <div class="radar-pulse"></div>
                    <div class="radar-pulse p2"></div>
                    <div class="radar-pulse p3"></div>
                    <div class="search-status-text">${text}</div>
                </div>
            `;
        });

        socket.on('system_start', (data) => {
            chatMessages.innerHTML = ''; 
            appendSystemBot(data);
        });

        socket.on('msg', (data) => {
            const div = document.createElement('div');
            div.className = 'message-row';
            div.innerHTML = `<span class="author">${data.user}:</span> <span class="text">${data.text}</span>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        socket.on('bot_message', (data) => {
            const div = document.createElement('div');
            div.className = 'bot-response';
            div.innerHTML = `<span class="bot-badge">BOT</span> <strong>Hyper Support:</strong> ${data.text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        socket.on('search_timeout', () => {
            chatMessages.innerHTML = `
                <div class="system-bot-card error-card" style="margin: auto; max-width: 500px; width: 100%;">
                    <div class="bot-header"><span class="bot-badge">BOT</span> Hyper Support</div>
                    <div class="bot-body">
                        <h3 style="color: #f04747; margin-bottom: 10px;">УПС!</h3>
                        <p style="margin-bottom: 10px; font-weight: bold;">Не удалось найти собеседника. Вот из-за чего это могло произойти:</p>
                        <ul class="error-reasons-list">
                            <li>Проверьте интернет-соединение</li>
                            <li>Проблемы с серверами</li>
                            <li>Не удалось найти собеседника в сети</li>
                        </ul>
                    </div>
                    <div class="bot-actions" style="margin-top: 15px;">
                        <a href="https://discord.com/channels/1508072266775265391/1524387141499621507" target="_blank" class="btn-card-action btn-check">Проверить статус</a>
                        <button class="btn-card-action btn-retry" onclick="retrySearch()">Повторить поиск</button>
                    </div>
                </div>
            `;
        });

        socket.on('system_skipped', (data) => {
            stopMedia();
            const div = document.createElement('div');
            div.className = 'system-bot-card error-card';
            div.innerHTML = `
                <div class="bot-header"><span class="bot-badge">BOT</span> Hyper Support</div>
                <div class="bot-body">
                    <h3>УПС!</h3>
                    <p>Вас пропустил пользователь <strong>${data.partnerName}</strong>.</p>
                </div>
                <div class="bot-actions">
                    <button class="btn-card-action btn-dl" onclick="downloadLog(\`${data.logData.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">Скачать LOG файл .txt</button>
                    <a href="https://discord.com/channels/1508072266775265391/1524383048026554458" target="_blank" class="btn-card-action btn-rep">Жалоба</a>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        socket.on('trigger_report', (data) => {
            const discLink = "https://discord.com/channels/1508072266775265391/1524383048026554458";
            const reportTemplate = `1. Имя собеседника: ${data.partnerName}\n2. Токен чата: ${data.token}\n3. Нарушение: `;
            navigator.clipboard.writeText(reportTemplate).then(() => {
                alert('Данные для репорта скопированы! Перенаправляем в канал...');
                window.open(discLink, '_blank');
            });
        });

        window.retrySearch = function() {
            const username = document.getElementById('username').value.trim();
            const discord = document.getElementById('dc-input').value.trim();
            const telegram = document.getElementById('tg-input').value.trim();
            socket.emit('register', { username, discord, telegram });
        };

        function appendSystemBot(data) {
            const div = document.createElement('div');
            div.className = 'system-bot-card';
            div.innerHTML = `
                <div class="bot-header"><span class="bot-badge">BOT</span> Hyper Support</div>
                <div class="bot-body">
                    <p>Вы попали в чат между <strong>${data.p1Name}</strong> и <strong>${data.p2Name}</strong></p>
                    <p>Ваш уникальный токен чата: <span class="token-highlight">${data.token}</span></p>
                    <p class="subtext">В случае проблем обратитесь с токеном в поддержку.</p>
                </div>
                <div class="bot-actions">
                    <a href="https://discord.com/channels/1508072266775265391/1524383048026554458" target="_blank" class="btn-card-action btn-rep">Жалоба</a>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function downloadLog(text) {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chat-history.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        msgInput.addEventListener('input', () => {
            const val = msgInput.value.trim();
            if (val.startsWith('/')) {
                const matches = commandsList.filter(c => c.cmd.startsWith(val));
                if (matches.length > 0) {
                    hints.innerHTML = matches.map(m => `<div class="hint-item" onclick="applyHint('${m.cmd}')"><strong>${m.cmd}</strong> — ${m.desc}</div>`).join('');
                    hints.classList.remove('hidden');
                } else {
                    hints.classList.add('hidden');
                }
            } else {
                hints.classList.add('hidden');
            }
        });

        function applyHint(cmd) {
            msgInput.value = cmd + ' ';
            msgInput.focus();
            hints.classList.add('hidden');
        }

        // --- WebRTC СИСТЕМА ДЛЯ СВЯЗИ В СТИЛЕ DISCORD ---
        let localStream = null;
        let peerConnection = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const mediaPanel = document.querySelector('.media-panel');
        const videoGrid = document.createElement('div');
        videoGrid.className = 'discord-video-grid hidden';
        videoGrid.innerHTML = `
            <div class="video-container local-container">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="video-label">Вы</div>
            </div>
            <div class="video-container remote-container">
                <video id="remote-video" autoplay playsinline></video>
                <div class="video-label" id="remote-label">Собеседник</div>
            </div>
        `;
        mediaPanel.insertBefore(videoGrid, document.getElementById('media-controls'));

        const voiceToggle = document.getElementById('voice-toggle');
        const mediaControls = document.getElementById('media-controls');

        voiceToggle.addEventListener('click', async function() {
            mediaControls.classList.toggle('hidden');
            videoGrid.classList.toggle('hidden');
            
            if (mediaControls.classList.contains('hidden')) {
                this.textContent = 'Начать голосовой чат';
                this.classList.remove('active-call');
                stopMedia();
            } else {
                this.textContent = 'Завершить звонок';
                this.classList.add('active-call');
                await startMedia();
            }
        });

        async function startMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('local-video').srcObject = localStream;
                initPeerConnection();
            } catch (err) {
                console.error('Ошибка доступа к медиа:', err);
                alert('Не удалось получить доступ к устройствам связи.');
            }
        }

        function stopMedia() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
            
            document.getElementById('share-btn').classList.remove('active');
            document.getElementById('share-btn').textContent = 'Трансляция экрана: ВЫКЛ';
        }

        function initPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);
            
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remote-video');
                if (!remoteVideo.srcObject) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('rtc_signal', { type: 'candidate', candidate: event.candidate });
                }
            };

            peerConnection.createOffer()
                .then(offer => peerConnection.setLocalDescription(offer))
                .then(() => {
                    socket.emit('rtc_signal', { type: 'offer', offer: peerConnection.localDescription });
                });
        }

        socket.on('rtc_signal', async (data) => {
            if (!peerConnection) return;
            
            if (data.type === 'offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('rtc_signal', { type: 'answer', answer: peerConnection.localDescription });
            } else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) {
                    console.error(e);
                }
            }
        });

        document.getElementById('share-btn').addEventListener('click', async function() {
            this.classList.toggle('active');
            if (this.classList.contains('active')) {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    
                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(videoTrack);
                    }
                    
                    document.getElementById('local-video').srcObject = screenStream;
                    this.textContent = 'Трансляция экрана: ВКЛ';

                    videoTrack.onended = () => { stopScreenShare(); };
                } catch (err) {
                    this.classList.remove('active');
                }
            } else {
                stopScreenShare();
            }
        });

        function stopScreenShare() {
            const shareBtn = document.getElementById('share-btn');
            shareBtn.classList.remove('active');
            shareBtn.textContent = 'Трансляция экрана: ВЫКЛ';
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (peerConnection) {
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                }
                document.getElementById('local-video').srcObject = localStream;
            }
        }

        document.getElementById('mic-btn').addEventListener('click', function() {
            this.classList.toggle('active');
            const enabled = this.classList.contains('active');
            this.textContent = enabled ? 'Микрофон: ВКЛ' : 'Микрофон: ВЫКЛ';
            if (localStream && localStream.getAudioTracks()[0]) localStream.getAudioTracks()[0].enabled = enabled;
        });

        document.getElementById('cam-btn').addEventListener('click', function() {
            this.classList.toggle('active');
            const enabled = this.classList.contains('active');
            this.textContent = enabled ? 'Камера: ВКЛ' : 'Камера: ВЫКЛ';
            if (localStream && localStream.getVideoTracks()[0]) localStream.getVideoTracks()[0].enabled = enabled;
        });

        document.getElementById('audio-btn').addEventListener('click', function() {
            this.classList.toggle('active');
            const enabled = this.classList.contains('active');
            this.textContent = enabled ? 'Наушники: ВКЛ' : 'Наушники: ВЫКЛ';
            document.getElementById('remote-video').muted = !enabled;
        });
    </script>

</body>
</html>
